services:
  web:
    container_name: thanapat-kp-web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - nginx-network

networks:
  nginx-network:
    external: true
